; PHP upload limits for the membership/form file attachments (up to 100 MB).
; Applies on PHP-FPM / FastCGI / CGI SAPIs. For Apache mod_php, see public/.htaccess.
;
; IMPORTANT: post_max_size must be larger than upload_max_filesize to leave room
; for the rest of the multipart form (text fields + boundary overhead). If a POST
; body exceeds post_max_size, PHP discards the ENTIRE request — including the CSRF
; token — which surfaces to the user as a "Page Expired" (419) error.
;
; NOTE: the web server has its own body-size cap that must ALSO be raised:
;   - nginx:  client_max_body_size 110m;   (default is only 1m)
;   - Apache: LimitRequestBody 115343360;  (0 = unlimited)
; These cannot be set from the application and must be configured on the server.
;
; .user.ini changes are re-read every user_ini.cache_ttl seconds (default 300),
; so allow a few minutes (or reload PHP-FPM) before they take effect.

upload_max_filesize = 100M
post_max_size = 110M
max_file_uploads = 20

; Large uploads over slow links need more time to receive and process.
max_execution_time = 300
max_input_time = 300
memory_limit = 256M
